<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* ============================
       CSS VARIABLES & THEME
    ============================ */
    :root {
      --bg:           #09090b;
      --bg-elevated:  #111113;
      --bg-card:      #18181b;
      --bg-hover:     #27272a;
      --border:       rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --text:         #fafafa;
      --text-muted:   #a1a1aa;
      --text-subtle:  #71717a;
      --accent:       #8b5cf6;
      --accent-alt:   #6366f1;
      --accent-glow:  rgba(139,92,246,0.25);
      --shadow-card:  0 1px 3px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.3);
      --shadow-hover: 0 4px 6px rgba(0,0,0,0.5), 0 16px 40px rgba(0,0,0,0.4);

      --cat-digital:  #6366f1;
      --cat-social:   #ec4899;
      --cat-branding: #f59e0b;
      --cat-content:  #10b981;
      --cat-strategy: #3b82f6;

      --radius:       16px;
      --font-sans:    'Inter', system-ui, sans-serif;
      --font-display: 'Space Grotesk', system-ui, sans-serif;
    }

    [data-theme="light"] {
      --bg:           #f4f4f5;
      --bg-elevated:  #ffffff;
      --bg-card:      #ffffff;
      --bg-hover:     #f0f0f1;
      --border:       rgba(0,0,0,0.07);
      --border-hover: rgba(0,0,0,0.14);
      --text:         #09090b;
      --text-muted:   #52525b;
      --text-subtle:  #a1a1aa;
      --shadow-card:  0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
      --shadow-hover: 0 4px 8px rgba(0,0,0,0.1),  0 16px 40px rgba(0,0,0,0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ============================
       HEADER
    ============================ */
    header {
      position: sticky;
      top: 0;
      z-index: 300;
      background: rgba(9,9,11,0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] header {
      background: rgba(244,244,245,0.9);
    }
    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa 0%, #818cf8 50%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .h-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .header-search {
      flex: 1;
      max-width: 380px;
      position: relative;
    }
    .header-search svg {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-subtle);
      pointer-events: none;
    }
    .header-search input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.5rem 1rem 0.5rem 2.5rem;
      font-size: 0.8125rem;
      font-family: var(--font-sans);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .header-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .header-search input::placeholder { color: var(--text-subtle); }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.875rem;
    }
    .updated-tag {
      font-size: 0.7rem;
      color: var(--text-subtle);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #10b981;
      animation: livePulse 2s ease-in-out infinite;
    }
    @keyframes livePulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
    .btn-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .btn-icon:hover {
      background: var(--bg-hover);
      color: var(--text);
      border-color: var(--border-hover);
    }

    /* ============================
       PAGE LAYOUT
    ============================ */
    .page-wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* ============================
       STATS ROW + CHART
    ============================ */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr) 300px;
      gap: 0.875rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.125rem 1.375rem;
      box-shadow: var(--shadow-card);
    }
    .stat-label {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-subtle);
      margin-bottom: 0.375rem;
    }
    .stat-value {
      font-family: var(--font-display);
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .stat-sub { font-size: 0.7rem; color: var(--text-subtle); }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      box-shadow: var(--shadow-card);
    }
    .chart-wrap { flex-shrink: 0; position: relative; }
    .chart-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .chart-num {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .chart-sub { font-size: 0.52rem; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.08em; }
    .chart-legend { display: flex; flex-direction: column; gap: 0.4rem; font-size: 0.7rem; }
    .leg-item { display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); }
    .leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .leg-name { flex: 1; }
    .leg-count { font-weight: 600; color: var(--text); }

    /* ============================
       FILTERS
    ============================ */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.375rem;
      flex-wrap: wrap;
    }
    .filter-lbl {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-subtle);
      margin-right: 0.125rem;
    }
    .chip {
      padding: 0.375rem 0.75rem;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.12s;
      font-family: var(--font-sans);
      font-weight: 500;
      white-space: nowrap;
    }
    .chip:hover {
      background: var(--bg-hover);
      color: var(--text);
      border-color: var(--border-hover);
    }
    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ============================
       GRID + CARDS
    ============================ */
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.875rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 1440px) { .bento-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 1024px) { .bento-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px) { .bento-grid { grid-template-columns: 1fr; } }

    .card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
      border: 1px solid var(--border);
      background: var(--bg-card);
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 1.125rem;
      box-shadow: var(--shadow-card);
    }
    .card:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    .card-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.8;
      transition: opacity 0.3s;
    }
    .card:hover .card-img {
      opacity: 1;
    }
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 55%, transparent 100%);
      pointer-events: none;
    }
    .card-fallback {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(139,92,246,0.05) 0%, rgba(99,102,241,0.05) 100%);
      pointer-events: none;
    }
    .card-tag {
      display: inline-block;
      font-size: 0.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9);
      position: relative;
      z-index: 2;
    }

    .card-tag.digital { background: var(--cat-digital); color: white; }
    .card-tag.social { background: var(--cat-social); color: white; }
    .card-tag.branding { background: var(--cat-branding); color: white; }
    .card-tag.content { background: var(--cat-content); color: white; }
    .card-tag.strategy { background: var(--cat-strategy); color: white; }

    .card-date {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.5rem;
      position: relative;
      z-index: 2;
    }
    .card-date::before {
      content: "●";
      margin-right: 0.3rem;
    }

    .card-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: white;
      line-height: 1.3;
      position: relative;
      z-index: 2;
    }

    /* ============================
       MODAL
    ============================ */
    .modal-open { overflow: hidden; }
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }
    .modal-bg.active {
      display: flex;
    }
    .modal-inner {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-width: 800px;
      margin: auto;
      position: relative;
      overflow: hidden;
      animation: mIn 0.22s ease;
    }
    @keyframes mIn {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }
    .modal-img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      display: block;
    }
    .modal-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .btn-sr {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
    }
    .btn-sr:hover {
      background: var(--bg-hover);
      color: var(--text);
    }
    .modal-close-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
    }
    .modal-close-btn:hover {
      background: var(--bg-hover);
      color: var(--text);
    }
    .modal-body {
      padding: 1.25rem;
      max-height: 60vh;
      overflow-y: auto;
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--text);
    }
    .modal-meta-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      font-size: 0.75rem;
    }
    .modal-tag {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.9);
    }
    .modal-tag.digital { background: var(--cat-digital); color: white; }
    .modal-tag.social { background: var(--cat-social); color: white; }
    .modal-tag.branding { background: var(--cat-branding); color: white; }
    .modal-tag.content { background: var(--cat-content); color: white; }
    .modal-tag.strategy { background: var(--cat-strategy); color: white; }

    .modal-date {
      color: var(--text-subtle);
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }
    .modal-date::before {
      content: "●";
    }

    .modal-divider {
      height: 1px;
      background: var(--border);
      margin: 1rem 0;
    }

    /* ============================
       EMPTY STATE
    ============================ */
    .empty-wrap {
      text-align: center;
      padding: 4rem 2rem;
      display: none;
    }
    .empty-wrap.active {
      display: block;
    }
    .empty-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .empty-desc {
      color: var(--text-subtle);
      font-size: 0.875rem;
    }

    /* ============================
       SCROLLBAR
    ============================ */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-hover);
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="logo">Marketing Hub</div>
      <div class="h-divider"></div>
      <div class="header-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input type="text" id="searchInput" placeholder="Search campaigns...">
      </div>
      <div class="header-right">
        <span class="updated-tag"><span class="live-dot"></span> Live</span>
        <button class="btn-icon" id="themeToggle" aria-label="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="btn-icon" id="downloadBtn" aria-label="Download">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="page-wrap">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Gesamtkampagnen</div>
        <div class="stat-value">18</div>
        <div class="stat-sub">Alle Zeiten</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Erfolgsquote</div>
        <div class="stat-value">85%</div>
        <div class="stat-sub">Im Durchschnitt</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Reichweite</div>
        <div class="stat-value">2.5M</div>
        <div class="stat-sub">Unique Users</div>
      </div>
      <div class="chart-card">
        <div class="chart-wrap">
          <svg width="120" height="120" viewBox="0 0 120 120" style="filter: drop-shadow(0 0 20px rgba(139,92,246,0.3));">
            <defs>
              <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color: #8b5cf6; stop-opacity: 1;"/>
                <stop offset="100%" style="stop-color: #6366f1; stop-opacity: 1;"/>
              </linearGradient>
            </defs>
            <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
            <circle cx="60" cy="60" r="50" fill="none" stroke="url(#gradient1)" stroke-width="8" stroke-dasharray="235" stroke-dashoffset="55" stroke-linecap="round"/>
            <circle cx="60" cy="60" r="40" fill="var(--bg)"/>
          </svg>
          <div class="chart-center">
            <div class="chart-num">73%</div>
            <div class="chart-sub">Q1 Target</div>
          </div>
        </div>
        <div class="chart-legend">
          <div class="leg-item">
            <div class="leg-dot" style="background: #8b5cf6;"></div>
            <div class="leg-name">Abgeschlossen</div>
            <div class="leg-count">14</div>
          </div>
          <div class="leg-item">
            <div class="leg-dot" style="background: #f59e0b;"></div>
            <div class="leg-name">In Arbeit</div>
            <div class="leg-count">3</div>
          </div>
          <div class="leg-item">
            <div class="leg-dot" style="background: #ef4444;"></div>
            <div class="leg-name">Verzögert</div>
            <div class="leg-count">1</div>
          </div>
        </div>
      </div>
    </div>

    <div class="filter-row">
      <span class="filter-lbl">KATEGORIE</span>
      <button class="chip active" data-filter="all">Alle</button>
      <button class="chip" data-filter="digital">Digital</button>
      <button class="chip" data-filter="social">Social Media</button>
      <button class="chip" data-filter="branding">Branding</button>
      <button class="chip" data-filter="content">Content</button>
      <button class="chip" data-filter="strategy">Strategie</button>
    </div>

    <div class="bento-grid" id="bentoGrid">
      <!-- Cards will be inserted here -->
    </div>

    <div class="empty-wrap" id="emptyWrap">
      <h2 class="empty-title">Keine Kampagnen gefunden</h2>
      <p class="empty-desc">Versuchen Sie, einen anderen Filter zu wählen oder Ihre Suche anzupassen.</p>
    </div>
  </div>

  <div class="modal-bg" id="modalBg">
    <div class="modal-inner" id="modalInner">
      <!-- Modal content will be inserted here -->
    </div>
  </div>

  <script>
    const campaigns = [
      {
        id: 1,
        title: 'Sommer-Kampagne 2024',
        category: 'social',
