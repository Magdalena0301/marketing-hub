<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* ============================
       CSS VARIABLES & THEME
    ============================ */
    :root {
      --bg:           #09090b;
      --bg-elevated:  #111113;
      --bg-card:      #18181b;
      --bg-hover:     #27272a;
      --border:       rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --text:         #fafafa;
      --text-muted:   #a1a1aa;
      --text-subtle:  #71717a;
      --accent:       #8b5cf6;
      --accent-alt:   #6366f1;
      --accent-glow:  rgba(139,92,246,0.25);
      --shadow-card:  0 1px 3px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.3);
      --shadow-hover: 0 4px 6px rgba(0,0,0,0.5), 0 16px 40px rgba(0,0,0,0.4);

      --cat-digital:  #6366f1;
      --cat-social:   #ec4899;
      --cat-branding: #f59e0b;
      --cat-content:  #10b981;
      --cat-strategy: #3b82f6;

      --radius:       16px;
      --font-sans:    'Inter', system-ui, sans-serif;
      --font-display: 'Space Grotesk', system-ui, sans-serif;
    }

    [data-theme="light"] {
      --bg:           #f4f4f5;
      --bg-elevated:  #ffffff;
      --bg-card:      #ffffff;
      --bg-hover:     #f0f0f1;
      --border:       rgba(0,0,0,0.07);
      --border-hover: rgba(0,0,0,0.14);
      --text:         #09090b;
      --text-muted:   #52525b;
      --text-subtle:  #a1a1aa;
      --shadow-card:  0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
      --shadow-hover: 0 4px 8px rgba(0,0,0,0.1),  0 16px 40px rgba(0,0,0,0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ============================
       HEADER
    ============================ */
    header {
      position: sticky;
      top: 0;
      z-index: 300;
      background: rgba(9,9,11,0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] header {
      background: rgba(244,244,245,0.9);
    }
    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa 0%, #818cf8 50%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .h-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .header-search {
      flex: 1;
      max-width: 380px;
      position: relative;
    }
    .header-search svg {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-subtle);
      pointer-events: none;
    }
    .header-search input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0.5rem 1rem 0.5rem 2.5rem;
      font-size: 0.8125rem;
      font-family: var(--font-sans);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .header-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .header-search input::placeholder { color: var(--text-subtle); }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.875rem;
    }
    .updated-tag {
      font-size: 0.7rem;
      color: var(--text-subtle);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #10b981;
      animation: livePulse 2s ease-in-out infinite;
    }
    @keyframes livePulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
    .btn-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .btn-icon:hover {
      background: var(--bg-hover);
      color: var(--text);
      border-color: var(--border-hover);
    }

    /* ============================
       PAGE LAYOUT
    ============================ */
    .page-wrap {
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* ============================
       STATS ROW + CHART
    ============================ */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr) 300px;
      gap: 0.875rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.125rem 1.375rem;
      box-shadow: var(--shadow-card);
    }
    .stat-label {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-subtle);
      margin-bottom: 0.375rem;
    }
    .stat-value {
      font-family: var(--font-display);
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .stat-sub { font-size: 0.7rem; color: var(--text-subtle); }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      box-shadow: var(--shadow-card);
    }
    .chart-wrap { flex-shrink: 0; position: relative; }
    .chart-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .chart-num {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .chart-sub { font-size: 0.52rem; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.08em; }
    .chart-legend { display: flex; flex-direction: column; gap: 0.4rem; font-size: 0.7rem; }
    .leg-item { display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); }
    .leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .leg-name { flex: 1; }
    .leg-count { font-weight: 600; color: var(--text); }

    /* ============================
       FILTERS
    ============================ */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.375rem;
      flex-wrap: wrap;
    }
    .filter-lbl {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-subtle);
      margin-right: 0.125rem;
    }
    .pill {
      padding: 0.35rem 0.875rem;
      border-radius: 100px;
      font-size: 0.775rem;
      font-weight: 500;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all 0.18s;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .pill:hover { border-color: var(--border-hover); color: var(--text); }
    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    /* ============================
       BENTO GRID â 12 columns
    ============================ */
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-auto-rows: 290px;
      gap: 0.875rem;
    }

    /* ============================
       ARTICLE CARDS
    ============================ */
    .article-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .article-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--border-hover);
    }
    .article-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Size variants */
    .card-hero    { grid-column: span 8; grid-row: span 2; }
    .card-tall    { grid-column: span 4; grid-row: span 2; }
    .card-wide    { grid-column: span 8; }
    .card-regular { grid-column: span 4; }

    /* Image */
    .card-img {
      position: relative;
      overflow: hidden;
      flex: 1;
      min-height: 100px;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .article-card:hover .card-img img { transform: scale(1.05); }
    .card-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 55%, transparent 100%);
      pointer-events: none;
    }
    .card-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-fallback-letter {
      font-family: var(--font-display);
      font-weight: 700;
      color: rgba(255,255,255,0.1);
      font-size: 4rem;
      user-select: none;
    }
    .card-hero .card-fallback-letter  { font-size: 8rem; }
    .card-tall .card-fallback-letter  { font-size: 5rem; }

    /* Badges */
    .card-badges {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      right: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 2;
    }
    .badge-cat {
      font-size: 0.58rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      color: #fff;
    }
    .badge-src {
      font-size: 0.58rem;
      font-weight: 500;
      padding: 0.2rem 0.625rem;
      border-radius: 100px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      color: rgba(255,255,255,0.78);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Card body */
    .card-body {
      padding: 0.875rem 1.125rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      flex-shrink: 0;
    }
    .card-hero .card-body { padding: 1.125rem 1.375rem 1.25rem; }
    .card-tall .card-body { padding: 0.875rem 1rem 1rem; }

    .card-date { font-size: 0.67rem; color: var(--text-subtle); }

    .card-title {
      font-family: var(--font-display);
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-regular .card-title { font-size: 0.9rem;   -webkit-line-clamp: 2; }
    .card-tall    .card-title { font-size: 1rem;     -webkit-line-clamp: 3; }
    .card-wide    .card-title { font-size: 1.075rem; -webkit-line-clamp: 2; }
    .card-hero    .card-title { font-size: 1.45rem;  -webkit-line-clamp: 3; }

    .card-excerpt {
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-hero .card-excerpt { -webkit-line-clamp: 3; font-size: 0.875rem; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.67rem;
      color: var(--text-subtle);
    }
    .card-rt { display: flex; align-items: center; gap: 0.3rem; }
    .card-arrow { color: var(--accent); opacity: 0.7; }

    /* ============================
       LOADING / EMPTY
    ============================ */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      gap: 1rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    .spinner {
      width: 30px; height: 30px;
      border: 2.5px solid var(--border-hover);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-wrap {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
    }
    .empty-wrap h3 {
      font-family: var(--font-display);
      font-size: 1.25rem;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    /* ============================
       MODAL
    ============================ */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(12px);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem;
      overflow-y: auto;
    }
    .modal-backdrop.open { display: flex; }

    .modal-box {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 800px;
      margin: auto;
      position: relative;
      overflow: hidden;
      animation: mIn 0.22s ease;
    }
    @keyframes mIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* Progress bar */
    .modal-progress { height: 3px; background: var(--border); }
    .modal-prog-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #8b5cf6, #6366f1, #60a5fa);
      transition: width 0.08s linear;
    }

    /* Close btn */
    .modal-close-wrap {
      position: absolute;
      top: 0.875rem;
      right: 0.875rem;
      z-index: 20;
    }
    .modal-close-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(9,9,11,0.75);
      backdrop-filter: blur(8px);
      color: rgba(255,255,255,0.75);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .modal-close-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* Hero image */
    .modal-hero-img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
    }
    .modal-hero-fallback {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 6rem;
      font-weight: 700;
      color: rgba(255,255,255,0.07);
    }

    /* Modal body */
    .modal-body {
      padding: 1.875rem 2.25rem 2.5rem;
    }

    .modal-meta-row {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      flex-wrap: wrap;
      margin-bottom: 0.875rem;
    }
    .m-meta { font-size: 0.7rem; color: var(--text-subtle); }
    .m-sep  { font-size: 0.6rem; color: var(--border-hover); }

    .modal-title {
      font-family: var(--font-display);
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1.22;
      color: var(--text);
      margin-bottom: 1.625rem;
    }

    /* Takeaways box */
    .takeaways-box {
      background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(99,102,241,0.05));
      border: 1px solid rgba(139,92,246,0.22);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
    }
    .tk-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.875rem;
    }
    .tk-label {
      font-size: 0.62rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      white-space: nowrap;
    }
    .tk-line { flex: 1; height: 1px; background: rgba(139,92,246,0.2); }
    .tk-list { list-style: none; display: flex; flex-direction: column; gap: 0.625rem; }
    .tk-list li {
      font-size: 0.875rem;
      line-height: 1.55;
      color: var(--text-muted);
      padding-left: 1.25rem;
      position: relative;
    }
    .tk-list li::before { content: 'â'; position: absolute; left: 0; color: var(--accent); }

    /* Section label */
    .sect-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-subtle);
      margin-bottom: 1.25rem;
    }
    .sect-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Article HTML content */
    .art-content {
      font-size: 0.9375rem;
      line-height: 1.8;
      color: var(--text-muted);
    }
    .art-content p   { margin-bottom: 1.125rem; }
    .art-content h2  { font-family: var(--font-display); font-size: 1.125rem; font-weight: 700; color: var(--text); margin: 2rem 0 0.75rem; }
    .art-content h3  { font-family: var(--font-display); font-size: 1rem;     font-weight: 600; color: var(--text); margin: 1.5rem 0 0.625rem; }
    .art-content h4  { font-weight: 600; color: var(--text); margin: 1.25rem 0 0.5rem; }
    .art-content ul, .art-content ol { padding-left: 1.5rem; margin-bottom: 1.125rem; }
    .art-content li  { margin-bottom: 0.4rem; }
    .art-content a   { color: var(--accent); text-decoration: none; }
    .art-content a:hover { text-decoration: underline; }
    .art-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1.25rem;
      margin: 1.25rem 0;
      background: rgba(139,92,246,0.06);
      border-radius: 0 8px 8px 0;
      font-style: italic;
    }
    .art-content strong, .art-content b { color: var(--text); font-weight: 600; }
    .art-content em, .art-content i { font-style: italic; }
    .art-content img { max-width: 100%; border-radius: 8px; margin: 1rem 0; border: 1px solid var(--border); }

    /* Modal footer */
    .modal-footer {
      margin-top: 2rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .btn-src {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.25rem;
      background: var(--accent);
      color: white;
      border-radius: 100px;
      font-size: 0.825rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-src:hover { opacity: 0.85; transform: translateY(-1px); }
    .m-footer-meta { font-size: 0.7rem; color: var(--text-subtle); }

    /* ============================
       RESPONSIVE
    ============================ */
    @media (max-width: 1200px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .chart-card { display: none; }
    }
    @media (max-width: 900px) {
      .bento-grid {
        grid-template-columns: repeat(6, 1fr);
        grid-auto-rows: 260px;
      }
      .card-hero    { grid-column: span 6; grid-row: span 2; }
      .card-tall    { grid-column: span 3; grid-row: span 2; }
      .card-wide    { grid-column: span 6; }
      .card-regular { grid-column: span 3; }
      .stats-row { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 640px) {
      .bento-grid {
        grid-template-columns: 1fr;
        grid-auto-rows: auto;
      }
      .card-hero,.card-tall,.card-wide,.card-regular { grid-column: span 1; grid-row: span 1; }
      .card-img { height: 200px; flex: none; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .header-search { max-width: 180px; }
      .modal-body { padding: 1.25rem 1.25rem 2rem; }
      .modal-title { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <span class="logo">Marketing Hub</span>
    <div class="h-divider"></div>
    <div class="header-search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Suche in Artikeln...">
    </div>
    <div class="header-right">
      <div class="updated-tag">
        <span class="live-dot"></span>
        <span id="updatedLabel">Wird geladen...</span>
      </div>
      <button class="btn-icon" id="themeToggle" title="Theme wechseln">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- MAIN -->
<div class="page-wrap">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Artikel insgesamt</div>
      <div class="stat-value" id="sTotal">â</div>
      <div class="stat-sub" id="sSub">aus mehreren Quellen</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Aktive Quellen</div>
      <div class="stat-value" id="sSources">â</div>
      <div class="stat-sub">RSS-Feeds</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Heute neu</div>
      <div class="stat-value" id="sToday">â</div>
      <div class="stat-sub" id="sDate">â</div>
    </div>
    <div class="chart-card">
      <div class="chart-wrap">
        <canvas id="donutCanvas" width="90" height="90"></canvas>
        <div class="chart-center">
          <span class="chart-num" id="chartNum">â</span>
          <span class="chart-sub">Kat.</span>
        </div>
      </div>
      <div class="chart-legend" id="chartLegend"></div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-row">
    <span class="filter-lbl">Filter:</span>
    <button class="pill active" data-filter="all">Alle</button>
    <button class="pill" data-filter="digital">Digital</button>
    <button class="pill" data-filter="social">Social Media</button>
    <button class="pill" data-filter="branding">Branding</button>
    <button class="pill" data-filter="content">Content</button>
    <button class="pill" data-filter="strategy">Strategie</button>
  </div>

  <!-- LOADING -->
  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div>
    <span>Artikel werden geladen...</span>
  </div>

  <!-- GRID -->
  <div class="bento-grid" id="bentoGrid" style="display:none;"></div>

  <!-- EMPTY -->
  <div class="empty-wrap" id="emptyWrap" style="display:none;">
    <h3>Keine Artikel gefunden</h3>
    <p>Versuche einen anderen Suchbegriff oder eine andere Kategorie.</p>
  </div>

</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-box">
    <div class="modal-progress"><div class="modal-prog-bar" id="progBar"></div></div>
    <div class="modal-close-wrap">
      <button class="modal-close-btn" id="modalCloseBtn" aria-label="Schliessen">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div id="modalInner"></div>
  </div>
</div>

<script>
/* ============================
   CONSTANTS
============================ */
var CAT_COLOR = {
  digital:'#6366f1', social:'#ec4899',
  branding:'#f59e0b', content:'#10b981', strategy:'#3b82f6'
};
var CAT_LABEL = {
  digital:'Digital', social:'Social Media',
  branding:'Branding', content:'Content', strategy:'Strategie'
};
var CAT_GRAD = {
  digital: 'linear-gradient(135deg,#1e1b4b,#312e81)',
  social:  'linear-gradient(135deg,#500724,#881337)',
  branding:'linear-gradient(135deg,#451a03,#92400e)',
  content: 'linear-gradient(135deg,#022c22,#065f46)',
  strategy:'linear-gradient(135deg,#172554,#1e3a8a)'
};
// 12-column bento pattern
var CARD_CLS = [
  'card-hero',    // 0: 8col x 2row â big feature
  'card-tall',    // 1: 4col x 2row â tall secondary
  'card-regular', // 2
  'card-regular', // 3
  'card-regular', // 4
  'card-wide',    // 5: 8col
  'card-regular', // 6
  'card-regular', // 7
  'card-regular', // 8
  'card-wide',    // 9
  'card-regular', // 10
];

/* ============================
   STATE
============================ */
var allArticles = [];
var currentFilter = 'all';
var searchQuery   = '';

/* ============================
   LOAD DATA
============================ */
function loadArticles() {
  fetch('data/news.json?t=' + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    })
    .then(function(d) {
      allArticles = d.articles || [];
      renderStats(d);
      renderGrid();
      var el = document.getElementById('updatedLabel');
      el.textContent = d.updated
        ? 'Aktualisiert ' + new Date(d.updated).toLocaleDateString('de-DE',{day:'numeric',month:'short'})
        : '';
    })
    .catch(function() {
      var fb = window.__NEWS_DATA || {articles:[],total:0,sources:[]};
      allArticles = fb.articles || [];
      renderStats(fb);
      renderGrid();
      document.getElementById('updatedLabel').textContent = 'Fallback';
    });
}

/* ============================
   STATS + DONUT CHART
============================ */
function renderStats(d) {
  var arts = d.articles || [];
  document.getElementById('sTotal').textContent   = arts.length || 'â';
  document.getElementById('sSources').textContent = (d.sources || []).length || 'â';

  var today    = new Date().toISOString().slice(0,10);
  var newToday = arts.filter(function(a){ return a.pubDate && a.pubDate.slice(0,10) === today; }).length;
  document.getElementById('sToday').textContent = newToday;
  document.getElementById('sDate').textContent  = d.updated
    ? 'Stand: ' + new Date(d.updated).toLocaleDateString('de-DE',{day:'numeric',month:'long'})
    : '';

  var cats = {};
  arts.forEach(function(a) {
    var c = a.category || 'digital';
    cats[c] = (cats[c] || 0) + 1;
  });
  drawDonut(cats, arts.length);
}

function drawDonut(cats, total) {
  var cv = document.getElementById('donutCanvas');
  if (!cv || !total) return;
  var ctx = cv.getContext('2d');
  var cx = 45, cy = 45, ro = 38, ri = 24;
  ctx.clearRect(0, 0, 90, 90);

  var entries = Object.entries(cats).sort(function(a,b){ return b[1]-a[1]; });
  var a = -Math.PI / 2;
  entries.forEach(function(e) {
    var slice = (e[1] / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, ro, a, a + slice);
    ctx.closePath();
    ctx.fillStyle = CAT_COLOR[e[0]] || '#6366f1';
    ctx.fill();
    a += slice;
  });

  ctx.beginPath();
  ctx.arc(cx, cy, ri, 0, Math.PI * 2);
  var isLight = document.documentElement.getAttribute('data-theme') === 'light';
  ctx.fillStyle = isLight ? '#ffffff' : '#111113';
  ctx.fill();

  document.getElementById('chartNum').textContent = Object.keys(cats).length;

  document.getElementById('chartLegend').innerHTML = entries.slice(0,5).map(function(e) {
    return '<div class="leg-item">'
      + '<span class="leg-dot" style="background:' + (CAT_COLOR[e[0]] || '#6366f1') + '"></span>'
      + '<span class="leg-name">' + (CAT_LABEL[e[0]] || e[0]) + '</span>'
      + '<span class="leg-count">' + e[1] + '</span>'
      + '</div>';
  }).join('');
}

/* ============================
   GRID RENDER
============================ */
function cardCls(i) {
  return CARD_CLS[i] || 'card-regular';
}

function renderGrid() {
  document.getElementById('loadingWrap').style.display = 'none';

  var filtered = allArticles.filter(function(a) {
    var mc = currentFilter === 'all' || a.category === currentFilter;
    var q  = searchQuery.toLowerCase();
    var ms = !q
      || (a.title       || '').toLowerCase().includes(q)
      || (a.description || '').toLowerCase().includes(q)
      || (a.source      || '').toLowerCase().includes(q);
    return mc && ms;
  });

  var grid  = document.getElementById('bentoGrid');
  var empty = document.getElementById('emptyWrap');

  if (!filtered.length) {
    grid.style.display  = 'none';
    empty.style.display = 'block';
    return;
  }
  grid.style.display  = 'grid';
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(function(a, i) {
    return buildCard(a, cardCls(i), i);
  }).join('');

  grid.querySelectorAll('.article-card').forEach(function(el, i) {
    el.addEventListener('click',   function(){ openModal(filtered[i]); });
    el.addEventListener('keydown', function(e){
      if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openModal(filtered[i]); }
    });
  });
}

function buildCard(a, cls, idx) {
  var cat    = a.category || 'digital';
  var color  = CAT_COLOR[cat] || '#6366f1';
  var grad   = CAT_GRAD[cat]  || CAT_GRAD.digital;
  var letter = (a.source || 'M').charAt(0).toUpperCase();
  var large  = cls === 'card-hero' || cls === 'card-tall' || cls === 'card-wide';
  var load   = idx < 3 ? 'eager' : 'lazy';

  var img = a.image
    ? '<img src="' + esc(a.image) + '" alt="" loading="' + load + '" '
        + 'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
      + '<div class="card-fallback" style="background:' + grad + ';display:none;">'
        + '<span class="card-fallback-letter">' + letter + '</span></div>'
    : '<div class="card-fallback" style="background:' + grad + '">'
        + '<span class="card-fallback-letter">' + letter + '</span></div>';

  var excerpt = (large && a.description)
    ? '<p class="card-excerpt">' + esc(a.description.substring(0, 220)) + '</p>'
    : '';

  return '<article class="article-card ' + cls + '" tabindex="0" role="button">'
    + '<div class="card-img">'
    +   img
    +   '<div class="card-badges">'
    +     '<span class="badge-cat" style="background:' + color + '">' + (CAT_LABEL[cat] || cat) + '</span>'
    +     '<span class="badge-src">' + esc(a.source || '') + '</span>'
    +   '</div>'
    + '</div>'
    + '<div class="card-body">'
    +   '<div class="card-date">' + fmtDate(a.pubDate) + '</div>'
    +   '<h2 class="card-title">' + esc(a.title || '') + '</h2>'
    +   excerpt
    +   '<div class="card-footer">'
    +     '<span class="card-rt">'
    +       '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'
    +         '<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>'
    +       (a.readingTime || 3) + ' Min.'
    +     '</span>'
    +     '<svg class="card-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">'
    +       '<path d="M5 12h14M12 5l7 7-7 7"/></svg>'
    +   '</div>'
    + '</div>'
    + '</article>';
}

/* ============================
   MODAL
============================ */
function extractKeyPoints(html) {
  if (!html) return [];
  var pts = [];

  // Prioritise list items
  var li = html.match(/<li[^>]*>([\s\S]*?)<\/li>/gi) || [];
  li.forEach(function(m) {
    var t = m.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
    if (t.length > 35 && t.length < 380) pts.push(t);
  });
  if (pts.length >= 3) return pts.slice(0, 7);

  // Fall back to paragraphs
  var pp = html.match(/<p[^>]*>([\s\S]*?)<\/p>/gi) || [];
  pp.forEach(function(m) {
    var t = m.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
    if (t.length > 70 && t.length < 450) pts.push(t);
  });
  return pts.slice(0, 6);
}

function openModal(a) {
  var cat    = a.category || 'digital';
  var color  = CAT_COLOR[cat] || '#6366f1';
  var grad   = CAT_GRAD[cat]  || CAT_GRAD.digital;
  var letter = (a.source || 'M').charAt(0).toUpperCase();
  var pts    = extractKeyPoints(a.fullContent);

  // Image
  var imgHtml = a.image
    ? '<img class="modal-hero-img" src="' + esc(a.image) + '" alt="" '
        + 'onerror="this.style.display=\'none\';document.getElementById(\'mFb\').style.display=\'flex\'">'
      + '<div id="mFb" class="modal-hero-fallback" style="background:' + grad + ';display:none;">' + letter + '</div>'
    : '<div class="modal-hero-fallback" style="background:' + grad + '">' + letter + '</div>';

  // Takeaways
  var tkHtml = '';
  if (pts.length) {
    tkHtml = '<div class="takeaways-box">'
      + '<div class="tk-header"><span class="tk-label">Wichtigste Erkenntnisse</span><span class="tk-line"></span></div>'
      + '<ul class="tk-list">' + pts.map(function(p){ return '<li>' + esc(p) + '</li>'; }).join('') + '</ul>'
      + '</div>';
  }

  // Article content
  var artHtml = '';
  if (a.fullContent) {
    artHtml = '<div class="sect-label">Vollstaendiger Artikel</div>'
      + '<div class="art-content">' + a.fullContent + '</div>';
  } else if (a.description) {
    artHtml = '<div class="sect-label">Zusammenfassung</div>'
      + '<div class="art-content"><p>' + esc(a.description) + '</p></div>';
  } else {
    artHtml = '<p style="color:var(--text-muted);font-size:.875rem">Kein Inhalt â Originalquelle besuchen.</p>';
  }

  document.getElementById('modalInner').innerHTML =
      imgHtml
    + '<div class="modal-body">'
    +   '<div class="modal-meta-row">'
    +     '<span class="badge-cat" style="background:' + color + '">' + (CAT_LABEL[cat] || cat) + '</span>'
    +     '<span class="m-sep">|</span><span class="m-meta">' + esc(a.source || '') + '</span>'
    +     '<span class="m-sep">|</span><span class="m-meta">' + fmtDate(a.pubDate) + '</span>'
    +     '<span class="m-sep">|</span><span class="m-meta">' + (a.readingTime || 3) + ' Min.</span>'
    +   '</div>'
    +   '<h1 class="modal-title">' + esc(a.title || '') + '</h1>'
    +   tkHtml
    +   artHtml
    +   '<div class="modal-footer">'
    +     '<a href="' + esc(a.link || '#') + '" target="_blank" rel="noopener noreferrer" class="btn-src">'
    +       'Zum Originalartikel'
    +       '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">'
    +         '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>'
    +         '<polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>'
    +       '</svg>'
    +     '</a>'
    +     '<span class="m-footer-meta">Quelle: ' + esc(a.source || '') + '</span>'
    +   '</div>'
    + '</div>';

  var bd = document.getElementById('modalBackdrop');
  bd.classList.add('open');
  document.body.style.overflow = 'hidden';
  bd.scrollTop = 0;
  document.getElementById('progBar').style.width = '0%';

  if (bd._sh) bd.removeEventListener('scroll', bd._sh);
  bd._sh = function() {
    var max = bd.scrollHeight - bd.clientHeight;
    document.getElementById('progBar').style.width =
      (max > 0 ? Math.min(100, bd.scrollTop / max * 100) : 0) + '%';
  };
  bd.addEventListener('scroll', bd._sh);
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}

/* ============================
   FILTERS + SEARCH
============================ */
document.querySelectorAll('.pill').forEach(function(p) {
  p.addEventListener('click', function() {
    document.querySelectorAll('.pill').forEach(function(x){ x.classList.remove('active'); });
    p.classList.add('active');
    currentFilter = p.dataset.filter;
    renderGrid();
  });
});

document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value;
  renderGrid();
});

document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
document.getElementById('modalBackdrop').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

/* ============================
   THEME
============================ */
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('mhTheme', t);
}
document.getElementById('themeToggle').addEventListener('click', function() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  if (allArticles.length) {
    var cats = {};
    allArticles.forEach(function(a){ var c = a.category||'digital'; cats[c]=(cats[c]||0)+1; });
    drawDonut(cats, allArticles.length);
  }
});

/* ============================
   UTILS
============================ */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'}); }
  catch(e) { return iso; }
}

/* ============================
   FALLBACK DATA + INIT
============================ */
window.__NEWS_DATA = {"updated":"2026-03-13T07:00:00Z","total":0,"sources":[],"articles":[]};

(function init() {
  applyTheme(localStorage.getItem('mhTheme') || 'dark');
  loadArticles();
})();
</script>

</body>
</html>
