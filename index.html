<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #09090b; --text: #fafafa; --accent: #8b5cf6; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
  </style>
</head>
<body>
<header style="position: sticky; top: 0; background: rgba(9,9,11,0.85); padding: 1rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.07);">
  <div style="max-width: 1440px; margin: 0 auto; display: flex; align-items: center; gap: 1.25rem;">
    <span style="font-weight: 700; font-size: 1.2rem; background: linear-gradient(135deg, #a78bfa 0%, #818cf8 50%, #60a5fa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Marketing Hub</span>
  </div>
</header>
<div style="max-width: 1440px; margin: 0 auto; padding: 1.5rem;">
  <div style="display: grid; grid-template-columns: repeat(3, 1fr) 300px; gap: 0.875rem; margin-bottom: 1.5rem;">
    <div style="background: #18181b; border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 1.125rem 1.375rem;">
      <div style="font-size: 0.62rem; font-weight: 700; text-transform: uppercase; color: #71717a; margin-bottom: 0.375rem;">Artikel insgesamt</div>
      <div style="font-size: 2.25rem; font-weight: 700; color: #fafafa;">—</div>
      <div style="font-size: 0.7rem; color: #71717a;">aus mehreren Quellen</div>
    </div>
  </div>
  <p>Marketing Hub Content Loaded Successfully</p>
</div>
</body>
</html>
