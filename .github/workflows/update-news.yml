name: Update Marketing News

on:
  schedule:
    # Runs daily at 7:00 AM UTC (9:00 AM CEST)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch marketing news
        run: python scripts/fetch_news.py

      - name: Commit and push updates
        run: |
          git config user.name "Marketing Hub Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "Daily news update - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
